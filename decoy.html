<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Snake Game</title>
    <style>
        /* Rosé Pine Moon Palette */
        :root {
            --base: #232136;
            --surface: #2a273f;
            --overlay: #393552;
            --muted: #6e6a86;
            --subtle: #908caa;
            --text: #e0def4;
            --love: #eb6f92;
            --gold: #f6c177;
            --rose: #ea9a97;
            --pine: #3e8fb0;
            --foam: #9ccfd8;
            --iris: #c4a7e7;
            --highlight-low: #2a283e;
            --highlight-med: #44415a;
            --highlight-high: #56526e;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: var(--base);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        .game-container {
            position: relative;
        }

        canvas {
            border: 5px solid var(--overlay);
            box-shadow: 0 0 25px rgba(0,0,0,0.3);
            background-color: var(--surface);
            border-radius: 8px;
        }

        .info {
            margin-bottom: 20px;
            text-align: center;
        }
        
        h1 { margin: 0; font-size: 28px; color: var(--iris); letter-spacing: 1px; }
        p { margin: 5px 0; color: var(--subtle); }
        
        .score { 
            font-size: 22px; 
            font-weight: bold; 
            color: var(--gold);
            margin-top: 10px;
        }

        /* Custom Game Over Modal */
        #gameOverModal {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: var(--overlay);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid var(--iris);
            z-index: 10;
            min-width: 200px;
        }

        #gameOverModal h2 {
            color: var(--love);
            margin-top: 0;
        }

        #gameOverModal .final-score {
            font-size: 24px;
            color: var(--gold);
            margin: 15px 0;
        }

        #gameOverModal button {
            background-color: var(--iris);
            color: var(--base);
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.1s, background-color 0.2s;
        }

        #gameOverModal button:hover {
            background-color: var(--rose);
            transform: scale(1.05);
        }

        #gameOverModal button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="info">
        <h1>Retro Snake</h1>
        <p>Используйте стрелки для управления</p>
        <div class="score">Счет: <span id="scoreVal">0</span></div>
    </div>
    
    <div class="game-container">
        <canvas id="snakeGame" width="400" height="400"></canvas>
        
        <div id="gameOverModal">
            <h2>Игра окончена!</h2>
            <div class="final-score">Счет: <span id="finalScoreVal">0</span></div>
            <button onclick="resetGame()">Играть снова</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");
        const finalScoreElement = document.getElementById("finalScoreVal");
        const modal = document.getElementById("gameOverModal");

        const colors = {
            snake: '#c4a7e7', // iris
            food: '#eb6f92',  // love
            bg: '#2a273f',    // surface
        };

        const box = 20;
        let score = 0;
        const gameSpeed = 150;

        let snake, food, d, nextD, gameInterval;

        function initGame() {
            score = 0;
            scoreElement.innerHTML = score;
            snake = [{ x: 10 * box, y: 10 * box }];
            food = {
                x: Math.floor(Math.random() * 20) * box,
                y: Math.floor(Math.random() * 20) * box
            };
            d = null;
            nextD = null;
            modal.style.display = "none";
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(draw, gameSpeed);
        }

        function resetGame() {
            initGame();
        }

        document.addEventListener("keydown", (event) => {
            const key = event.keyCode;
            if(key == 37 && d != "RIGHT") nextD = "LEFT";
            else if(key == 38 && d != "DOWN") nextD = "UP";
            else if(key == 39 && d != "LEFT") nextD = "RIGHT";
            else if(key == 40 && d != "UP") nextD = "DOWN";
        });

        function collision(head, array) {
            for(let i = 0; i < array.length; i++) {
                if(head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        function draw() {
            ctx.fillStyle = colors.bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (nextD) d = nextD;

            for(let i = 0; i < snake.length; i++) {
                ctx.fillStyle = colors.snake;
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeStyle = colors.bg;
                ctx.lineWidth = 2;
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }

            ctx.fillStyle = colors.food;
            ctx.beginPath();
            ctx.arc(food.x + box/2, food.y + box/2, box/2 - 2, 0, Math.PI * 2);
            ctx.fill();

            if (!d) return; // Ждем первого нажатия

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if( d == "LEFT") snakeX -= box;
            if( d == "UP") snakeY -= box;
            if( d == "RIGHT") snakeX += box;
            if( d == "DOWN") snakeY += box;

            if(snakeX == food.x && snakeY == food.y) {
                score++;
                scoreElement.innerHTML = score;
                food = {
                    x: Math.floor(Math.random() * 20) * box,
                    y: Math.floor(Math.random() * 20) * box
                };
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(gameInterval);
                finalScoreElement.innerHTML = score;
                modal.style.display = "block";
                return;
            }

            snake.unshift(newHead);
        }

        initGame();
    </script>
</body>
</html>
